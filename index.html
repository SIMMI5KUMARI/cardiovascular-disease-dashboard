<!DOCTYPE html> <html> <head> <title>Heart Disease Prediction</title> <link rel="stylesheet" href="/static/style.css"> </head> <body> <div class="form-container"> <h2>Heart Disease Risk Predictor</h2> <form action="/predict" method="post"> <input type="number" name="age" placeholder="Age" required> <select name="gender"> <option value="1">Male</option> <option value="2">Female</option> </select> <input type="number" name="height" placeholder="Height (cm)" required> <input type="number" name="weight" placeholder="Weight (kg)" required> <input type="number" name="ap_hi" placeholder="Systolic BP" required> <input type="number" name="ap_lo" placeholder="Diastolic BP" required> <select name="cholesterol"> <option value="1">Normal Cholesterol</option> <option value="2">Above Normal</option> <option value="3">High</option> </select> <select name="gluc"> <option value="1">Normal Glucose</option> <option value="2">Above Normal</option> <option value="3">High</option> </select> <select name="smoke"> <option value="0">Non Smoker</option> <option value="1">Smoker</option> </select> <select name="alco"> <option value="0">No Alcohol</option> <option value="1">Alcohol Consumption</option> </select> <select name="active"> <option value="1">Physically Active</option> <option value="0">Not Active</option> </select> <button class="btn">Predict Risk</button> </form> </div> </body> </html>
